# /etc/nginx/sites-available/masjid_hayria
# Symlink: /etc/nginx/sites-enabled/masjid_hayria → bu fayl
# nginx -t && systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 139.59.130.53 _;

    # Yuklash hajmi (CSV importlar uchun zaxira)
    client_max_body_size 20M;

    # Static fayllar — Django'dan o'tkazmasdan, to'g'ridan-to'g'ri
    location /static/ {
        alias /opt/masjid_hayria/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Django ilovasi (Gunicorn 127.0.0.1:8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 90s;
    }

    # Sevimli ikonkalar va h.k. uchun ortiqcha 404 log'lar yo'q
    location = /favicon.ico { access_log off; log_not_found off; return 204; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; }
}
